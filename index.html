<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAP AI | AI Photobooth Excellence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; scroll-behavior: smooth; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        .hero-glow { background: radial-gradient(circle at 50% -10%, #2e2a77 0%, #050505 60%); }
        
        /* 导航栏样式保持 */
        .glass-nav { background: rgba(8, 8, 8, 0.6); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border-bottom: 1px solid rgba(255, 255, 255, 0.08); z-index: 100; }
        .glass-dropdown { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        nav { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .nav-hidden { transform: translateY(-100%); }
        .dropdown:hover .dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-menu { opacity: 0; visibility: hidden; transform: translateY(10px); transition: all 0.3s ease; }

        @keyframes textGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .gold-gradient { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); background-size: 200% auto; -webkit-background-clip: text; color: transparent; animation: textGradient 4s linear infinite; }
        .purple-gradient { background: linear-gradient(to right, #6366f1, #c084fc, #6366f1); background-size: 200% auto; -webkit-background-clip: text; color: transparent; animation: textGradient 4s linear infinite; }

        /* 核心：修复后的高级滑块质感 (1:1 肖像) */
        .sync-slider-container { position: relative; aspect-ratio: 1/1; width: 100%; overflow: hidden; border-radius: 32px; border: 1px solid rgba(255,255,255,0.05); background: #111; }
        
        /* 修复逻辑：左侧是揭开层 */
        .ai-reveal-layer { 
            position: absolute; inset: 0; width: 50%; overflow: hidden; z-index: 20; 
            mask-image: linear-gradient(to right, black 95%, transparent 100%); 
            -webkit-mask-image: linear-gradient(to right, black 95%, transparent 100%);
        }
        .ai-reveal-layer img { position: absolute; inset: 0; height: 100%; max-width: none; object-fit: cover; }
        
        /* 扫描线：男紫女粉篮球橘 */
        .scan-beam { position: absolute; top: 0; right: 0; width: 1px; height: 100%; z-index: 30; }
        #male-layer .scan-beam { background: rgba(99, 102, 241, 0.8); box-shadow: 0 0 15px rgba(99, 102, 241, 0.5); }
        #female-layer .scan-beam { background: rgba(236, 72, 153, 0.8); box-shadow: 0 0 15px rgba(236, 72, 153, 0.5); }
        #basketball-layer .scan-beam { background: rgba(251, 146, 60, 0.8); box-shadow: 0 0 15px rgba(251, 146, 60, 0.5); }
        
        /* 磨砂手柄球 */
        .handle-ball {
            position: absolute; top: 50%; right: -24px; transform: translateY(-50%);
            width: 48px; height: 48px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
            z-index: 40; overflow: hidden;
        }
        
        /* 动态浮动光晕 */
        .handle-glow { position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s ease; z-index: 1; pointer-events: none; }
        #male-layer .handle-glow { background: radial-gradient(circle at var(--glow-x, 50%) var(--glow-y, 50%), rgba(99, 102, 241, 0.9) 0%, transparent 75%); }
        #female-layer .handle-glow { background: radial-gradient(circle at var(--glow-x, 50%) var(--glow-y, 50%), rgba(236, 72, 153, 0.9) 0%, transparent 75%); }
        #basketball-layer .handle-glow { background: radial-gradient(circle at var(--glow-x, 50%) var(--glow-y, 50%), rgba(251, 146, 60, 0.9) 0%, transparent 75%); }
        .sync-slider-container:hover .handle-glow { opacity: 1; }

        /* 箭头图标：男紫女粉篮球橘 */
        .arrow-icon-wrapper { position: relative; z-index: 5; display: flex; gap: 3px; align-items: center; }
        .arrow-icon { font-size: 11px; transition: opacity 0.3s ease; animation: arrowPulse 2s infinite; }
        #male-layer .arrow-icon { color: #a5b4fc; filter: drop-shadow(0 0 5px rgba(99, 102, 241, 0.8)); }
        #female-layer .arrow-icon { color: #f9a8d4; filter: drop-shadow(0 0 5px rgba(236, 72, 153, 0.8)); }
        #basketball-layer .arrow-icon { color: #fdba74; filter: drop-shadow(0 0 5px rgba(251, 146, 60, 0.8)); }
        @keyframes arrowPulse { 0%, 100% { opacity: 0.5; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } }
        
        .slider-label { position: absolute; bottom: 16px; padding: 4px 12px; border-radius: 8px; font-size: 9px; font-weight: 900; letter-spacing: 0.1em; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 40; text-transform: uppercase; pointer-events: none; }
        .wa-float { animation: pulse-green 2s infinite; }
    </style>
</head>
<body class="hero-glow">

    <nav id="navbar" class="fixed top-0 w-full glass-nav z-[110]">
        <div class="max-w-[1400px] mx-auto px-4 py-3 md:py-5 flex flex-col md:flex-row items-center justify-between gap-2 md:gap-0">
            <a href="index.html" class="flex-shrink-0"><img src="snap_logo.png" alt="SNAP" class="h-6 md:h-9 rounded"></a>
            <div class="flex gap-4 md:gap-12 lg:gap-16 text-gray-200 text-[10px] md:text-[13px] font-bold uppercase tracking-wider md:tracking-[0.15em] items-center">
                <div class="relative dropdown">
                    <a href="#" class="nav-link flex items-center gap-1 hover:text-white py-1">Services <i class="fa-solid fa-chevron-down text-[8px] opacity-50"></i></a>
                    <div class="dropdown-menu absolute top-full -left-6 md:left-0 pt-4 z-[120]">
                        <div class="glass-dropdown w-48 md:w-64 p-2 md:p-3 rounded-xl md:rounded-2xl shadow-2xl text-white">
                            <a href="#" class="block px-3 py-2.5 md:px-4 md:py-3 hover:bg-white/10 rounded-lg text-xs transition">AI Faceswap Booth</a>
                            <a href="#" class="block px-3 py-2.5 md:px-4 md:py-3 hover:bg-white/10 rounded-lg text-xs transition">AI Costume Booth</a>
                            <a href="#" class="block px-3 py-2.5 md:px-4 md:py-3 hover:bg-white/10 rounded-lg text-xs transition">AI Themes Booth</a>
                        </div>
                    </div>
                </div>
                <a href="#events" class="nav-link hover:text-white py-1">Showcase</a>
                <a href="about.html" class="nav-link hover:text-white py-1">About Us</a>
                <a href="mailto:hellofunprint@gmail.com" class="nav-link hover:text-white py-1">Contact</a>
            </div>
        </div>
    </nav>

    <section class="max-w-7xl mx-auto pt-44 md:pt-56 pb-16 px-6 text-center overflow-visible">
        <div class="inline-block px-4 py-1.5 border border-indigo-500/20 rounded-full text-indigo-400 text-[10px] md:text-[11px] font-bold mb-8 tracking-[0.2em] uppercase bg-indigo-500/5">
            Next-Gen AI Experience
        </div>
        
        <h1 class="text-6xl md:text-9xl font-black tracking-tighter mb-8 leading-[1.1] uppercase overflow-visible pb-4">
            <span class="gold-gradient">Unleash The</span> <br>
            <span class="purple-gradient">Legend.</span>
        </h1>

        <div id="sync-interaction-area" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-7xl mx-auto mt-12 cursor-none touch-none">
            
            <div class="sync-slider-container shadow-2xl shadow-indigo-500/10">
                <img src="me01.jpg" class="w-full h-full object-cover">
                <span class="slider-label right-4 text-white/40">Before</span>
                <div class="ai-reveal-layer" id="male-layer">
                    <img src="spaceme.jpg" alt="AI Male" class="sync-target-img">
                    <span class="slider-label left-4 text-indigo-400 border border-indigo-500/30">AI Result</span>
                    <div class="scan-beam"><div class="handle-ball"><div class="handle-glow"></div><div class="arrow-icon-wrapper"><i class="fa-solid fa-chevron-left arrow-icon"></i><i class="fa-solid fa-chevron-right arrow-icon"></i></div></div></div>
                </div>
            </div>

            <div class="sync-slider-container shadow-2xl shadow-purple-500/10">
                <img src="me02.jpg" class="w-full h-full object-cover">
                <span class="slider-label right-4 text-white/40">Before</span>
                <div class="ai-reveal-layer" id="female-layer">
                    <img src="lady.jpg" alt="AI Female" class="sync-target-img">
                    <span class="slider-label left-4 text-pink-400 border border-pink-500/30">AI Result</span>
                    <div class="scan-beam"><div class="handle-ball"><div class="handle-glow"></div><div class="arrow-icon-wrapper"><i class="fa-solid fa-chevron-left arrow-icon"></i><i class="fa-solid fa-chevron-right arrow-icon"></i></div></div></div>
                </div>
            </div>

            <div class="sync-slider-container shadow-2xl shadow-orange-500/10">
                <img src="me03.jpg" class="w-full h-full object-cover">
                <span class="slider-label right-4 text-white/40">Before</span>
                <div class="ai-reveal-layer" id="basketball-layer">
                    <img src="futurefighter.jpg" alt="AI Result" class="sync-target-img">
                    <span class="slider-label left-4 text-orange-400 border border-orange-500/30">AI Result</span>
                    <div class="scan-beam"><div class="handle-ball"><div class="handle-glow"></div><div class="arrow-icon-wrapper"><i class="fa-solid fa-chevron-left arrow-icon"></i><i class="fa-solid fa-chevron-right arrow-icon"></i></div></div></div>
                </div>
            </div>

        </div>
        
        <p class="mt-12 text-indigo-300 text-[10px] md:text-xs font-bold tracking-[0.4em] uppercase opacity-40 animate-pulse">
            Swipe anywhere to trigger AI Scan
        </p>
    </section>

    <a href="https://wa.me/6598631242" target="_blank" class="fixed bottom-8 right-8 z-[100] group">
        <div class="wa-float glass-nav flex items-center gap-3 p-4 px-6 rounded-full bg-green-500/10 border border-green-500/30 hover:bg-green-600 transition-all duration-500 shadow-2xl">
            <i class="fa-brands fa-whatsapp text-2xl text-green-400 group-hover:text-white transition-colors"></i>
            <span class="text-white font-bold text-sm tracking-widest hidden md:block">WhatsApp Support</span>
        </div>
    </a>

    <script>
        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            let st = window.pageYOffset || document.documentElement.scrollTop;
            if (st > lastScrollTop && st > 100) nav.classList.add('nav-hidden');
            else nav.classList.remove('nav-hidden');
            lastScrollTop = st;
        });

        const interactionArea = document.getElementById('sync-interaction-area');
        const layers = [document.getElementById('male-layer'), document.getElementById('female-layer'), document.getElementById('basketball-layer')];
        const syncImages = document.querySelectorAll('.sync-target-img');
        const handleGlows = document.querySelectorAll('.handle-glow');

        function resizeImages() {
            const containerWidth = document.querySelector('.sync-slider-container').offsetWidth;
            syncImages.forEach(img => img.style.width = containerWidth + 'px');
        }
        window.addEventListener('resize', resizeImages);
        resizeImages();

        let lastX = 0, lastTime = 0;

        function syncMove(e) {
            const rect = interactionArea.getBoundingClientRect();
            const clientX = e.pageX || (e.touches ? e.touches[0].pageX : 0);
            const clientY = e.pageY || (e.touches ? e.touches[0].pageY : 0);
            
            let x = clientX - rect.left;
            let percent = (x / rect.width) * 100;
            if (percent < 0) percent = 0;
            if (percent > 100) percent = 100;

            requestAnimationFrame(() => {
                layers.forEach(layer => { layer.style.width = percent + '%'; });
                handleGlows.forEach(glow => {
                    const ballRect = glow.parentElement.getBoundingClientRect();
                    const relX = ((clientX - ballRect.left) / ballRect.width) * 2 - 1;
                    const relY = ((clientY - ballRect.top) / ballRect.height) * 2 - 1;
                    glow.style.setProperty('--glow-x', `${50 + relX * 12}%`); 
                    glow.style.setProperty('--glow-y', `${50 + relY * 12}%`);

                    const now = performance.now();
                    const speed = lastTime > 0 ? Math.abs((clientX - lastX) / (now - lastTime)) : 0;
                    const intensity = Math.min(0.8 + speed * 0.2, 1);
                    const isMale = glow.closest('#male-layer') !== null;
                    const isFemale = glow.closest('#female-layer') !== null;
                    let color = isMale ? `rgba(99, 102, 241, ${intensity})` : (isFemale ? `rgba(236, 72, 153, ${intensity})` : `rgba(251, 146, 60, ${intensity})`);
                    glow.style.background = `radial-gradient(circle at var(--glow-x) var(--glow-y), ${color} 0%, transparent 80%)`;
                    lastX = clientX; lastTime = now;
                });
            });
        }

        interactionArea.addEventListener('mousemove', syncMove);
        interactionArea.addEventListener('touchmove', (e) => { syncMove(e); e.preventDefault(); }, { passive: false });

        window.onload = () => {
            resizeImages();
            setTimeout(() => {
                layers.forEach(l => {
                    l.style.transition = "width 1.8s cubic-bezier(0.65, 0, 0.35, 1)";
                    l.style.width = '50%';
                });
                setTimeout(() => layers.forEach(l => l.style.transition = "none"), 1800);
            }, 500);
        };
    </script>
</body>
</html>
